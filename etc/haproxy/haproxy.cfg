# HAProxy configuration for Stalwart
# Generated from services.csv - Make changes there!

global
    daemon
    maxconn 4096
    user haproxy
    group haproxy

defaults
    mode tcp
    timeout connect 5s

frontend smtp_in
    default_backend stalwart_smtp
    bind :25
    bind :::25
    timeout client 300s

backend stalwart_smtp
    server stalwart stalwart-mail:25 send-proxy-v2
    timeout server 300s

frontend submission_in
    default_backend stalwart_submission
    bind :587
    bind :::587
    timeout client 60s

backend stalwart_submission
    server stalwart stalwart-mail:587 send-proxy-v2
    timeout server 60s

frontend submissions_in
    default_backend stalwart_submissions
    bind :465
    bind :::465
    timeout client 60s

backend stalwart_submissions
    server stalwart stalwart-mail:465 send-proxy-v2
    timeout server 60s

frontend imap_in
    default_backend stalwart_imap
    bind :143
    bind :::143
    timeout client 60s

backend stalwart_imap
    server stalwart stalwart-mail:143 send-proxy-v2
    timeout server 60s

frontend imaps_in
    default_backend stalwart_imaps
    bind :993
    bind :::993
    timeout client 3600s

backend stalwart_imaps
    server stalwart stalwart-mail:993 send-proxy-v2
    timeout server 3600s

frontend pop3_in
    default_backend stalwart_pop3
    bind :110
    bind :::110
    timeout client 60s

backend stalwart_pop3
    server stalwart stalwart-mail:110 send-proxy-v2
    timeout server 60s

frontend pop3s_in
    default_backend stalwart_pop3s
    bind :995
    bind :::995
    timeout client 60s

backend stalwart_pop3s
    server stalwart stalwart-mail:995 send-proxy-v2
    timeout server 60s

frontend sieve_in
    default_backend stalwart_sieve
    bind :4190
    bind :::4190
    timeout client 60s

backend stalwart_sieve
    server stalwart stalwart-mail:4190 send-proxy-v2
    timeout server 60s

frontend http_in
    default_backend stalwart_http
    bind 127.0.0.1:9080
    timeout client 300s

backend stalwart_http
    server stalwart stalwart-mail:8080 send-proxy-v2
    timeout server 300s

frontend https_in
    default_backend stalwart_https
    bind 127.0.0.1:8443
    timeout client 300s

backend stalwart_https
    server stalwart stalwart-mail:443 send-proxy-v2
    timeout server 300s

