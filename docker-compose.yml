services:
  haproxy:
    image: haproxy:alpine
    restart: unless-stopped
    container_name: stalwart-proxy
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./etc/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./etc/hosts:/etc/hosts:ro
    user: root

  stalwart:
    image: stalwartlabs/stalwart:latest
    restart: unless-stopped
    container_name: stalwart-mail
    networks:
      - internal   # Only internel Network – no hosts ports!
    volumes:
      - stalwart-etc:/etc/stalwart
      - stalwart-data:/var/lib/stalwart
      - stalwart-log:/var/log/stalwart

volumes:
  stalwart-etc:
    external: true
  stalwart-data:
    external: true
  stalwart-log:
    external: true

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.42.37.0/24        # The fixed sub-network
          gateway: 10.42.37.1          # Gateway for that network
