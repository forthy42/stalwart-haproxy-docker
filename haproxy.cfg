global
    daemon
    maxconn 4096

defaults
    mode tcp
    option tcplog

# Frontend für Port 25 (Eingehende Mails von anderen Servern)
frontend smtp_in
    bind :25
    bind :::25
    mode tcp
    option tcplog
    default_backend stalwart_smtp

# Frontend für Port 587 (Submission - Clients mit Passwort)
frontend submission_in
    bind :587
    bind :::587
    mode tcp
    option tcplog
    default_backend stalwart_submission

# Frontend für Port 465 (SMTPS - alte, implizite TLS)
frontend smtps_in
    bind :465
    bind :::465
    mode tcp
    option tcplog
    default_backend stalwart_submissions

# Frontend für Port 993 (pop3s in)
frontend imaps_in
    bind :993
    bind :::993
    mode tcp
    option tcplog
    default_backend stalwart_imaps

# Frontend für Port 995 (pop3s in)
frontend pop3s_in
    bind :995
    bind :::995
    mode tcp
    option tcplog
    default_backend stalwart_pop3s

# Frontend für Port 4190 (filter)
frontend filter_in
    bind :4190
    bind :::4190
    mode tcp
    option tcplog
    default_backend stalwart_filter

# Frontend für Port 9080 (http)
frontend http_in
    bind :9080
    bind :::9080
    mode tcp
    option tcplog
    default_backend stalwart_http

# Frontend für Port 9443 (http)
frontend https_in
    bind :9443
    bind :::9443
    mode tcp
    option tcplog
    default_backend stalwart_https

# Backends - das "send-proxy-v2" ist der Zauberstab
backend stalwart_smtp
    server stalwart stalwart-mail:25 send-proxy-v2

backend stalwart_submission
    server stalwart stalwart-mail:587 send-proxy-v2

backend stalwart_submissions
    server stalwart stalwart-mail:465 send-proxy-v2

backend stalwart_imaps
    server stalwart stalwart-mail:993 send-proxy-v2

backend stalwart_pop3s
    server stalwart stalwart-mail:995 send-proxy-v2

backend stalwart_filter
    server stalwart stalwart-mail:4190 send-proxy-v2

backend stalwart_http
    server stalwart stalwart-mail:8080 send-proxy-v2

backend stalwart_https
    server stalwart stalwart-mail:443 send-proxy-v2
